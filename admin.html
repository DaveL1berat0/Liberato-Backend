<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberato · Panel de Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06070D; --bg-2:#0B0E17; --bg-3:#0E1119;
    --gold:#CCA94F; --gold-2:#E7CC74; --gold-dim:rgba(204,169,79,0.12);
    --up:#2EE8A4; --down:#B197FC; --cyan:#4FD6E0;
    --ink:#F3F0E7; --ink-2:#9CA3AF; --ink-3:#6B7280; --ink-4:#4B5563;
    --brd:rgba(255,255,255,0.06); --brd-gold:rgba(204,169,79,0.25);
    --serif:Georgia,'Times New Roman',serif;
    --sans:'Space Grotesk',-apple-system,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;padding:32px 20px;}
  .wrap{max-width:1100px;margin:0 auto;}
  .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--brd);}
  .hd-title{font-family:var(--serif);font-size:26px;font-weight:600;}
  .hd-title span{color:var(--gold);}
  .hd-sub{font-size:12px;color:var(--ink-3);font-family:var(--mono);margin-top:4px;}
  /* Gate de clave */
  .gate{max-width:380px;margin:80px auto;text-align:center;}
  .gate-title{font-family:var(--serif);font-size:22px;margin-bottom:8px;}
  .gate-sub{font-size:13px;color:var(--ink-2);margin-bottom:24px;}
  .field-input{width:100%;background:var(--bg-2);border:1px solid var(--brd);border-radius:10px;padding:13px 15px;color:var(--ink);font-family:var(--mono);font-size:14px;outline:none;transition:border 0.2s;}
  .field-input:focus{border-color:var(--brd-gold);}
  .btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#1a1305;border:none;border-radius:10px;padding:13px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;margin-top:14px;transition:opacity 0.2s;}
  .btn:hover{opacity:0.9;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-sm{width:auto;padding:9px 18px;font-size:13px;margin-top:0;}
  /* Métricas */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
  .metric{background:var(--bg-2);border:1px solid var(--brd);border-radius:14px;padding:20px;}
  .metric-v{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--gold-2);line-height:1;}
  .metric-k{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;margin-top:8px;}
  .metric.accent .metric-v{color:var(--up);}
  /* Tabs */
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{background:var(--bg-2);border:1px solid var(--brd);border-radius:9px;padding:9px 18px;font-size:13px;color:var(--ink-2);cursor:pointer;transition:all 0.2s;}
  .tab.active{background:var(--gold-dim);border-color:var(--brd-gold);color:var(--gold-2);}
  /* Tabla */
  .panel{background:var(--bg-2);border:1px solid var(--brd);border-radius:14px;padding:6px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:13px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-4);border-bottom:1px solid var(--brd);font-weight:500;}
  td{padding:13px 14px;border-bottom:1px solid var(--brd);color:var(--ink-2);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.015);}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
  .badge-premium{background:rgba(204,169,79,0.12);color:var(--gold-2);border:1px solid var(--brd-gold);}
  .badge-free{background:rgba(255,255,255,0.04);color:var(--ink-3);border:1px solid var(--brd);}
  .badge-ok{background:rgba(46,232,164,0.1);color:var(--up);}
  .badge-no{background:rgba(177,151,252,0.1);color:var(--down);}
  .hidden{display:none;}
  .msg{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;}
  .msg-err{background:rgba(177,151,252,0.1);color:var(--down);border:1px solid rgba(177,151,252,0.25);}
  .msg-ok{background:rgba(46,232,164,0.1);color:var(--up);border:1px solid rgba(46,232,164,0.25);}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:8px;}
  .form-g{flex:1;min-width:120px;}
  .form-g label{display:block;font-size:11px;color:var(--ink-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;}
  select.field-input{cursor:pointer;}
  .empty{text-align:center;padding:40px;color:var(--ink-4);font-size:13px;}
  .refresh{background:none;border:1px solid var(--brd);color:var(--ink-2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--mono);}
  .refresh:hover{border-color:var(--brd-gold);color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">

  <!-- GATE: pedir clave de admin -->
  <div id="gate" class="gate">
    <div class="gate-title">Panel de <span style="color:var(--gold)">Administración</span></div>
    <div class="gate-sub">Ingresa la clave de administrador</div>
    <div id="gate-msg"></div>
    <input class="field-input" id="admin-key" type="password" placeholder="Clave de admin" onkeydown="if(event.key==='Enter')enter()">
    <button class="btn" id="btn-enter" onclick="enter()">Entrar</button>
  </div>

  <!-- DASHBOARD (oculto hasta autenticar) -->
  <div id="dash" class="hidden">
    <div class="hd">
      <div>
        <div class="hd-title">Liberato <span>Admin</span></div>
        <div class="hd-sub">Panel de control · usuarios y membresías</div>
      </div>
      <button class="refresh" onclick="loadAll()">↻ Actualizar</button>
    </div>

    <!-- Métricas -->
    <div class="metrics" id="metrics"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-users" onclick="showTab('users')">Usuarios</div>
      <div class="tab" id="tab-coupons" onclick="showTab('coupons')">Cupones</div>
    </div>

    <!-- Panel usuarios -->
    <div id="view-users">
      <div class="panel">
        <table>
          <thead><tr><th>Email</th><th>Nombre</th><th>Plan</th><th>Verificado</th><th>Registro</th></tr></thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Panel cupones -->
    <div id="view-coupons" class="hidden">
      <div class="panel" style="padding:20px;margin-bottom:18px;">
        <div style="font-size:14px;font-weight:600;margin-bottom:14px;color:var(--ink);">Crear cupón / oferta</div>
        <div id="coupon-msg"></div>
        <div class="form-row">
          <div class="form-g">
            <label>Código</label>
            <input class="field-input" id="c-code" placeholder="LANZAMIENTO20" style="text-transform:uppercase;">
          </div>
          <div class="form-g">
            <label>Tipo</label>
            <select class="field-input" id="c-type" onchange="toggleCType()">
              <option value="percent">% descuento</option>
              <option value="amount">$ descuento</option>
            </select>
          </div>
          <div class="form-g">
            <label id="c-val-label">Porcentaje (%)</label>
            <input class="field-input" id="c-value" type="number" placeholder="20">
          </div>
        </div>
        <div class="form-row">
          <div class="form-g">
            <label>Duración</label>
            <select class="field-input" id="c-duration">
              <option value="once">Una vez</option>
              <option value="repeating">Meses repetidos</option>
              <option value="forever">Para siempre</option>
            </select>
          </div>
          <div class="form-g">
            <label>Expira en (días, opcional)</label>
            <input class="field-input" id="c-expires" type="number" placeholder="ej. 7 (oferta temporal)">
          </div>
          <div class="form-g" style="flex:0;">
            <button class="btn btn-sm" id="btn-coupon" onclick="createCoupon()">Crear cupón</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <table>
          <thead><tr><th>Código</th><th>Descuento</th><th>Duración</th><th>Veces usado</th><th>Estado</th></tr></thead>
          <tbody id="coupons-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Cambia esta URL si tu backend de usuarios está en otro dominio
  var API = window.LBC_AUTH_API || 'https://liberato-usuarios-production.up.railway.app';
  var KEY = '';

  function $(id){return document.getElementById(id);}
  function msg(id, text, type){
    var el=$(id);
    el.innerHTML='<div class="msg msg-'+(type==='ok'?'ok':'err')+'">'+text+'</div>';
    if(type==='ok')setTimeout(function(){el.innerHTML='';},4000);
  }

  async function api(path){
    var r = await fetch(API+path+(path.indexOf('?')>=0?'&':'?')+'key='+encodeURIComponent(KEY));
    if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error(e.detail||('Error '+r.status));}
    return r.json();
  }
  async function apiPost(path, body){
    var r = await fetch(API+path+'?key='+encodeURIComponent(KEY), {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error(e.detail||('Error '+r.status));}
    return r.json();
  }

  async function enter(){
    KEY = $('admin-key').value.trim();
    if(!KEY){msg('gate-msg','Ingresa la clave','err');return;}
    $('btn-enter').disabled=true;
    try{
      await api('/api/admin/metrics');  // valida la clave
      $('gate').classList.add('hidden');
      $('dash').classList.remove('hidden');
      sessionStorage.setItem('lbc_admin_key', KEY);
      loadAll();
    }catch(e){
      msg('gate-msg','Clave incorrecta o backend no disponible','err');
    }finally{
      $('btn-enter').disabled=false;
    }
  }

  async function loadAll(){
    loadMetrics();
    loadUsers();
    loadCoupons();
  }

  async function loadMetrics(){
    try{
      var m = await api('/api/admin/metrics');
      $('metrics').innerHTML =
        metric(m.total_usuarios,'Usuarios totales') +
        metric(m.premium,'Premium', true) +
        metric(m.free,'Free') +
        metric(m.conversion_pct+'%','Conversión') +
        metric(m.verificados,'Verificados') +
        metric(m.registros_ultimos_7d,'Nuevos (7d)') +
        metric(m.sesiones_activas,'Sesiones activas');
    }catch(e){ $('metrics').innerHTML='<div class="empty">No se pudieron cargar las métricas</div>'; }
  }
  function metric(v,k,accent){
    return '<div class="metric'+(accent?' accent':'')+'"><div class="metric-v">'+v+'</div><div class="metric-k">'+k+'</div></div>';
  }

  async function loadUsers(){
    try{
      var d = await api('/api/admin/users&limit=200');
      if(!d.users || !d.users.length){ $('users-body').innerHTML='<tr><td colspan="5" class="empty">Sin usuarios todavía</td></tr>'; return; }
      $('users-body').innerHTML = d.users.map(function(u){
        var plan = u.plan==='premium'
          ? '<span class="badge badge-premium">Premium</span>'
          : '<span class="badge badge-free">Free</span>';
        var ver = u.verified
          ? '<span class="badge badge-ok">Sí</span>'
          : '<span class="badge badge-no">No</span>';
        var date = (u.created_at||'').slice(0,10);
        return '<tr><td style="color:var(--ink);">'+esc(u.email)+'</td><td>'+esc(u.name||'—')+'</td><td>'+plan+'</td><td>'+ver+'</td><td style="font-family:var(--mono);font-size:12px;">'+date+'</td></tr>';
      }).join('');
    }catch(e){ $('users-body').innerHTML='<tr><td colspan="5" class="empty">Error al cargar usuarios</td></tr>'; }
  }

  async function loadCoupons(){
    try{
      var d = await api('/api/admin/coupons');
      if(!d.coupons || !d.coupons.length){ $('coupons-body').innerHTML='<tr><td colspan="5" class="empty">Sin cupones activos</td></tr>'; return; }
      $('coupons-body').innerHTML = d.coupons.map(function(c){
        var estado = c.activo?'<span class="badge badge-ok">Activo</span>':'<span class="badge badge-no">Inactivo</span>';
        return '<tr><td style="font-family:var(--mono);color:var(--gold-2);">'+esc(c.code)+'</td><td>'+esc(c.descuento)+'</td><td>'+esc(c.duration)+'</td><td>'+c.veces_usado+'</td><td>'+estado+'</td></tr>';
      }).join('');
    }catch(e){ $('coupons-body').innerHTML='<tr><td colspan="5" class="empty">Error al cargar cupones (¿Stripe configurado?)</td></tr>'; }
  }

  function toggleCType(){
    var t = $('c-type').value;
    $('c-val-label').textContent = t==='percent' ? 'Porcentaje (%)' : 'Monto ($)';
    $('c-value').placeholder = t==='percent' ? '20' : '50';
  }

  async function createCoupon(){
    var code = $('c-code').value.trim().toUpperCase();
    var type = $('c-type').value;
    var value = parseFloat($('c-value').value);
    var duration = $('c-duration').value;
    var expires = $('c-expires').value.trim();
    if(!code || !value){ msg('coupon-msg','Completa código y valor','err'); return; }
    var body = {code:code, duration:duration};
    if(type==='percent') body.percent_off=value; else body.amount_off=value;
    if(expires) body.expires_days=parseInt(expires);
    $('btn-coupon').disabled=true;
    try{
      await apiPost('/api/admin/create-coupon', body);
      msg('coupon-msg','Cupón '+code+' creado ✓','ok');
      $('c-code').value=''; $('c-value').value=''; $('c-expires').value='';
      loadCoupons();
    }catch(e){
      msg('coupon-msg', e.message, 'err');
    }finally{
      $('btn-coupon').disabled=false;
    }
  }

  function showTab(t){
    $('tab-users').classList.toggle('active', t==='users');
    $('tab-coupons').classList.toggle('active', t==='coupons');
    $('view-users').classList.toggle('hidden', t!=='users');
    $('view-coupons').classList.toggle('hidden', t!=='coupons');
  }

  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

  // Auto-login si ya hay clave en sesión
  (function(){
    var saved = sessionStorage.getItem('lbc_admin_key');
    if(saved){ $('admin-key').value=saved; enter(); }
  })();
</script>
</body>
</html>
